services:
  backend-test:
    build: ./backend
    volumes:
      - ./integration.test.js:/backend/integration.test.js
    command: sh -c "sleep 5 && node --test /backend/integration.test.js"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db-test:5432/translations_test
    working_dir: /backend
    depends_on:
      db-test:
        condition: service_healthy
    networks:
      - test-network

  db-test:
    image: postgres:15
    environment:
      POSTGRES_DB: translations_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

networks:
  test-network:
    driver: bridge
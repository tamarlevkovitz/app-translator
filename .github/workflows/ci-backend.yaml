name: ci-backend
on:
 push:
   branches: [ci-cd, main]
   paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yaml'
      - 'docker-compose.test.yml' 
      - 'integration.test.mjs'
 pull_request:
   branches: [main, ci-cd]
   paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yaml'
      - 'docker-compose.test.yml'   
      - 'integration.test.mjs'
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  unit-tests:
   name: run unit-test
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '18'
    
     - name: Install dependencies
       working-directory: ./backend
       run: npm install
    
     - name: Run unit tests
       working-directory: ./backend
       run: npm test
    

     - name: Test summary
       run: echo "Hi I'm  backend pipline nice to meet you"
       
  build:
    name: build 
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }}
          load: true
      
      - name: Test Docker image
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }} node --version
          echo "✅ Docker image works!"

  integration-tests:
   name: Run Integration Tests
   runs-on: ubuntu-latest
   needs: build
   if: |
    github.ref == 'refs/heads/main' ||
    github.ref == 'refs/heads/ci-cd' ||
    github.event_name == 'pull_request'
  
   steps:
     - uses: actions/checkout@v4
    
     - name: Run tests with Docker Compose
       run: |
        docker compose -f docker-compose.test.yml up \
          --build \
          --abort-on-container-exit \
          --exit-code-from backend-test
    
     - name: Show logs
       if: always()
       run: docker compose -f docker-compose.test.yml logs
    
     - name: Cleanup
       if: always()
       run: docker compose -f docker-compose.test.yml down -v
  publish:
    name: Push to DockerHub
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd') &&
      needs.build.result == 'success' &&
      (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }}
  tagging:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd') &&
      needs.publish.result == 'success'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Calculate next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          VERSION=$(echo $LATEST_TAG | sed 's/v//')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
      
      - name: Create and push tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
          echo "✅ Tag ${{ steps.version.outputs.version }} created!"

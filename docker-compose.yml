services:
  backend:
    build: ./backend 
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/translations
      TRANSLATOR_HOST: translator-service
    depends_on:
      - translator-service
      - db-service
    networks:
      - backend_network
      - fronted_network
      - translator_network


  db-service:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: translations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data  
      - ./db:/docker-entrypoint-initdb.d/
    networks:
      - backend_network

  frontend:
    build: ./frontend 
    ports:
      - "8080:80" 
    networks:
      - fronted_network
    depends_on:
      - backend

  translator-service:
    image: libretranslate/libretranslate
    ports:
      - "5000:5000"
    networks:
      - translator_network
    depends_on:
      - db-service
    environment:
      - LT_UPDATE_MODELS=false      # 1. מונע ניסיון הורדה שנכשל
      - PYTHONHTTPSVERIFY=0         # 2. מתעלם משגיאות SSL בגלל הסינון
      - LT_LOAD_ONLY=en,he          # 3. טוען רק מה שצריך כדי לחסוך זמן
volumes:
  db_data:

networks:
  backend_network:
    driver: bridge
  translator_network:
    driver: bridge
  fronted_network:
    driver: bridge

    

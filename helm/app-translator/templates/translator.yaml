apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator
spec:
  replicas: {{ .Values.translator.replicaCount }}
  selector:
    matchLabels:
      app: translator
  template:
    metadata:
      labels:
        app: translator
    spec:
      containers:
      - name: translator
        image: {{ .Values.translator.image }}
        imagePullPolicy: {{ .Values.translator.imagePullPolicy }}
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.translator.service.name }}
spec:
  selector:
    app: translator
  ports:
  - port: {{ .Values.translator.service.port }}
    targetPort: 5000
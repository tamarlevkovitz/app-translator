apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator
spec:
  replicas: {{ .Values.translator.replicas }}
  selector:
    matchLabels:
      app: translator
  template:
    metadata:
      labels:
        app: translator
    spec:
      containers:
      - name: translator
        image: {{ .Values.translator.image }}
        ports:
        - containerPort: {{ .Values.translator.port }}
        resources:
          requests:
            memory: {{ .Values.translator.resources.requests.memory | quote }}
            cpu: {{ .Values.translator.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.translator.resources.limits.memory | quote }}
            cpu: {{ .Values.translator.resources.limits.cpu | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: translator-service
spec:
  selector:
    app: translator
  ports:
  - port: {{ .Values.translator.port }}
    targetPort: {{ .Values.translator.port }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator
spec:
  replicas: {{ .Values.translator.replicaCount }}
  selector:
    matchLabels:
      app: translator
  template:
    metadata:
      labels:
        app: translator
    spec:
      containers:
      - name: translator
        image: {{ .Values.translator.image }}
        ports:
        - containerPort: {{ .Values.translator.port }}
        resources:
          {{- toYaml .Values.translator.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: translator-service
spec:
  selector:
    app: translator
  ports:
  - port: {{ .Values.translator.port }}
    targetPort: {{ .Values.translator.port }}